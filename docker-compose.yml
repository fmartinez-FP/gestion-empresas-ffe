services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ffe-app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage
      - ./public:/var/www/html/public
      - ./.env:/var/www/html/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ffe-network

  nginx:
    image: nginx:1.25-alpine
    container_name: ffe-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8084}:80"
    volumes:
      - ./public:/var/www/html/public
      - ./.env:/var/www/html/.env:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
    networks:
      - ffe-network

  mysql:
    image: mysql:8.0
    container_name: ffe-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gestion_empresas}
      MYSQL_USER: ${DB_USERNAME:-ffe_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ffe-network

# Para conectar con gestion-ldap ya desplegado en otra red Docker,
# sustituye el bloque networks por:
#
# networks:
#   ffe-network:
#     external: true
#     name: gestion-ldap_default

networks:
  ffe-network:
    driver: bridge

volumes:
  mysql-data:
